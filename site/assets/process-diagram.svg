<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">Layer cycle process</title>
  <desc id="desc">A scheme of photopolymer print layer motion: homing, lift, retract, exposure and repeat.</desc>
  <rect width="1000" height="520" fill="#ffffff"/>
  <g font-family="Arial" fill="#17202a">
    <text x="500" y="58" text-anchor="middle" font-size="30" font-weight="700">Послойная последовательность печати</text>
    <g transform="translate(70 125)">
      <rect width="170" height="150" rx="8" fill="#e0f2fe" stroke="#2563eb" stroke-width="3"/>
      <text x="85" y="54" text-anchor="middle" font-size="22" font-weight="700">Homing</text>
      <text x="85" y="88" text-anchor="middle" font-size="15">поиск нуля Z</text>
      <text x="85" y="113" text-anchor="middle" font-size="15">через концевик</text>
    </g>
    <g transform="translate(300 125)">
      <rect width="170" height="150" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="3"/>
      <text x="85" y="54" text-anchor="middle" font-size="22" font-weight="700">Lift</text>
      <text x="85" y="88" text-anchor="middle" font-size="15">подъем платформы</text>
      <text x="85" y="113" text-anchor="middle" font-size="15">для отрыва слоя</text>
    </g>
    <g transform="translate(530 125)">
      <rect width="170" height="150" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="3"/>
      <text x="85" y="54" text-anchor="middle" font-size="22" font-weight="700">Retract</text>
      <text x="85" y="88" text-anchor="middle" font-size="15">возврат на</text>
      <text x="85" y="113" text-anchor="middle" font-size="15">высоту экспозиции</text>
    </g>
    <g transform="translate(760 125)">
      <rect width="170" height="150" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
      <text x="85" y="54" text-anchor="middle" font-size="22" font-weight="700">UV</text>
      <text x="85" y="88" text-anchor="middle" font-size="15">засветка</text>
      <text x="85" y="113" text-anchor="middle" font-size="15">следующего слоя</text>
    </g>
    <path d="M240 200h58" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M470 200h58" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M700 200h58" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M845 277c-25 110-655 110-690 0" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="12 10" marker-end="url(#arrow)"/>
    <text x="500" y="432" text-anchor="middle" font-size="18" fill="#5c6672">Существующая логика уже описывает перемещение платформы,</text>
    <text x="500" y="462" text-anchor="middle" font-size="18" fill="#5c6672">а экспозиция и вывод изображения добавляются следующим этапом.</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#334155"/>
    </marker>
  </defs>
</svg>
