<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Z axis control diagram</title>
  <desc id="desc">Stepper motor control with ESP32-S3, A4988 driver, endstop and vertical build platform.</desc>
  <rect width="1000" height="620" fill="#ffffff"/>
  <rect x="42" y="44" width="250" height="150" rx="8" fill="#e0f2fe" stroke="#2563eb" stroke-width="3"/>
  <text x="167" y="102" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#17202a">ESP32-S3</text>
  <text x="167" y="140" text-anchor="middle" font-family="Arial" font-size="18" fill="#334155">GPIO: STEP / DIR / EN</text>
  <rect x="380" y="44" width="240" height="150" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="3"/>
  <text x="500" y="102" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#17202a">A4988</text>
  <text x="500" y="140" text-anchor="middle" font-family="Arial" font-size="18" fill="#334155">драйвер шагового двигателя</text>
  <rect x="706" y="44" width="238" height="150" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="3"/>
  <text x="825" y="102" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#17202a">NEMA17</text>
  <text x="825" y="140" text-anchor="middle" font-family="Arial" font-size="18" fill="#334155">механическое перемещение Z</text>
  <path d="M292 119h88" stroke="#17202a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M620 119h86" stroke="#17202a" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="150" y="285" width="700" height="266" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <line x1="352" y1="330" x2="352" y2="505" stroke="#64748b" stroke-width="16" stroke-linecap="round"/>
  <line x1="648" y1="330" x2="648" y2="505" stroke="#64748b" stroke-width="16" stroke-linecap="round"/>
  <rect x="396" y="350" width="208" height="54" rx="7" fill="#d9e2ec" stroke="#94a3b8" stroke-width="3"/>
  <rect x="430" y="405" width="140" height="82" rx="8" fill="#94a3b8"/>
  <rect x="280" y="505" width="440" height="24" rx="5" fill="#0f766e"/>
  <text x="500" y="575" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#17202a">Ось Z: координатная модель, homing, контроль концевика</text>
  <rect x="748" y="388" width="56" height="96" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
  <text x="776" y="514" text-anchor="middle" font-family="Arial" font-size="17" fill="#991b1b">endstop</text>
  <path d="M748 432H675" stroke="#ef4444" stroke-width="4" stroke-dasharray="10 8"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#17202a"/>
    </marker>
  </defs>
</svg>

