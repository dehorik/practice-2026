<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">NeoPixel photopolymer printer visual</title>
  <desc id="desc">A technical visualization of a compact resin 3D printer with a Z axis, UV exposure area, and display module.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.52" stop-color="#12323a"/>
      <stop offset="1" stop-color="#1d2633"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="1">
      <stop offset="0" stop-color="#19b4a6" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
