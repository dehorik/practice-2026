<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" role="img" aria-labelledby="title desc">
  <title id="title">NeoPixel system map</title>
  <desc id="desc">System components of a small photopolymer 3D printer.</desc>
  <rect width="1000" height="580" fill="#ffffff"/>
  <text x="500" y="55" text-anchor="middle" font-family="Arial" font-size="31" font-weight="700" fill="#17202a">Функциональная декомпозиция NeoPixel</text>
