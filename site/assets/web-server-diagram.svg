<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Simple web server architecture</title>
  <desc id="desc">Educational HTTP server request processing diagram.</desc>
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="500" y="58" text-anchor="middle" font-family="Arial" font-size="31" font-weight="700" fill="#17202a">Python Simple Web Server</text>
  <g font-family="Arial">
    <rect x="70" y="126" width="190" height="108" rx="8" fill="#e0f2fe" stroke="#2563eb" stroke-width="3"/>
    <text x="165" y="171" text-anchor="middle" font-size="23" font-weight="700" fill="#17202a">Клиент</text>
    <text x="165" y="200" text-anchor="middle" font-size="16" fill="#475569">браузер или curl</text>
    <rect x="330" y="126" width="210" height="108" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="3"/>
    <text x="435" y="171" text-anchor="middle" font-size="23" font-weight="700" fill="#17202a">TCP socket</text>
    <text x="435" y="200" text-anchor="middle" font-size="16" fill="#475569">accept / recv / sendall</text>
    <rect x="620" y="126" width="250" height="108" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="3"/>
    <text x="745" y="171" text-anchor="middle" font-size="23" font-weight="700" fill="#17202a">SimpleWebServer</text>
    <text x="745" y="200" text-anchor="middle" font-size="16" fill="#475569">жизненный цикл запроса</text>
    <path d="M260 180h68" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M540 180h78" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="120" y="340" width="180" height="102" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="3"/>
    <text x="210" y="381" text-anchor="middle" font-size="21" font-weight="700" fill="#17202a">Parser</text>
    <text x="210" y="410" text-anchor="middle" font-size="15" fill="#475569">метод, путь, headers</text>
    <rect x="410" y="340" width="180" height="102" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
    <text x="500" y="381" text-anchor="middle" font-size="21" font-weight="700" fill="#17202a">Router</text>
    <text x="500" y="410" text-anchor="middle" font-size="15" fill="#475569">static или API</text>
    <rect x="700" y="300" width="190" height="78" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="3"/>
    <text x="795" y="333" text-anchor="middle" font-size="20" font-weight="700" fill="#17202a">src/public</text>
    <text x="795" y="358" text-anchor="middle" font-size="14" fill="#475569">HTML, CSS, TXT</text>
    <rect x="700" y="416" width="190" height="78" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="3"/>
    <text x="795" y="449" text-anchor="middle" font-size="20" font-weight="700" fill="#17202a">JSON API</text>
    <text x="795" y="474" text-anchor="middle" font-size="14" fill="#475569">/api/time, /api/echo</text>
    <path d="M745 234C708 287 327 284 242 340" fill="none" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M300 391h108" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M590 382l108-34" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M590 404l108 42" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M702 518C530 570 284 552 166 236" fill="none" stroke="#0f766e" stroke-width="4" stroke-dasharray="12 9" marker-end="url(#arrow-green)"/>
    <text x="500" y="560" text-anchor="middle" font-size="18" fill="#5c6672">HTTP-ответ: статус, заголовки, Content-Type, Content-Length и тело ответа</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#0f766e"/>
    </marker>
  </defs>
</svg>
